<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkyWatch — Situational Awareness</title>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/leaflet.css">
    <script src="/static/leaflet.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-left">
            <h1 class="logo">⚡ SkyWatch</h1>
            <span class="subtitle">Nationwide Situational Awareness</span>
        </div>
        <div class="top-bar-right">
            <span class="status-indicator" id="connection-status">● LIVE</span>
            <span class="last-updated" id="last-updated"></span>
        </div>
    </header>

    <main class="dashboard">
        <!-- Stats Panel (top strip) -->
        <section class="panel panel-stats"
                 hx-get="/api/stats"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
            <div class="loading">Loading stats...</div>
        </section>

        <!-- Map Panel (left, large) -->
        <section class="panel panel-map">
            <div id="map"></div>
        </section>

        <!-- Event Feed (right column) -->
        <section class="panel panel-feed">
            <div class="panel-header">
                <h2>Event Feed</h2>
                <div class="feed-filters">
                    <select id="filter-source" hx-get="/api/events" hx-include="#filter-severity"
                            hx-target="#event-list" hx-trigger="change" name="source">
                        <option value="">All Sources</option>
                        <option value="nws">NWS</option>
                        <option value="usgs">USGS</option>
                    </select>
                    <select id="filter-severity" hx-get="/api/events" hx-include="#filter-source"
                            hx-target="#event-list" hx-trigger="change" name="severity">
                        <option value="">All Severity</option>
                        <option value="extreme">Extreme</option>
                        <option value="severe">Severe</option>
                        <option value="moderate">Moderate</option>
                        <option value="minor">Minor</option>
                    </select>
                </div>
            </div>
            <div id="event-list"
                 hx-get="/api/events"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
                <div class="loading">Loading events...</div>
            </div>
        </section>

        <!-- Feed Health (bottom strip) -->
        <section class="panel panel-health">
            <div class="panel-header"><h2>Feed Status</h2></div>
            <div id="feed-health"
                 hx-get="/api/health"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
                <div class="loading">Checking feeds...</div>
            </div>
        </section>
    </main>

    <script>
        // Initialize Leaflet map centered on CONUS
        const map = L.map('map', {
            center: [39.8, -98.5],
            zoom: 4,
            zoomControl: true,
        });

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Layer groups
        let alertLayer = L.layerGroup().addTo(map);
        let meshLayer = L.layerGroup().addTo(map);

        // Layer control
        L.control.layers(null, {
            'NWS Alerts': alertLayer,
            'FL Mesh Nodes': meshLayer,
        }, { collapsed: false }).addTo(map);

        // Refresh NWS alert markers
        async function refreshAlerts() {
            try {
                const resp = await fetch('/api/map');
                const events = await resp.json();

                alertLayer.clearLayers();

                events.forEach(e => {
                    const marker = L.circleMarker([e.lat, e.lng], {
                        radius: e.severity === 'extreme' ? 8 : e.severity === 'severe' ? 6 : 4,
                        fillColor: e.color,
                        color: '#1a1a2e',
                        weight: 1,
                        opacity: 0.9,
                        fillOpacity: 0.7,
                    });

                    marker.bindPopup(`
                        <strong>${e.title}</strong><br>
                        <em>${e.source.toUpperCase()}</em> · ${e.severity.toUpperCase()}<br>
                        ${e.area || ''}${e.onset ? '<br>Onset: ' + e.onset : ''}
                    `);

                    alertLayer.addLayer(marker);
                });
            } catch (err) {
                console.error('Alert refresh error:', err);
            }
        }

        // Refresh FL Mesh node markers
        async function refreshMesh() {
            try {
                const resp = await fetch('/api/mesh-nodes');
                const nodes = await resp.json();

                meshLayer.clearLayers();

                nodes.forEach(n => {
                    if (n.latitude == null || n.longitude == null) return;

                    const lat = n.latitude / 1e7;
                    const lng = n.longitude / 1e7;
                    if (lat === 0 && lng === 0) return;

                    // Age: green if heard <1h, yellow <24h, grey otherwise
                    const updMs = n.updated_at ? Date.now() - new Date(n.updated_at).getTime() : Infinity;
                    const color = updMs < 3600000 ? '#22c55e' : updMs < 86400000 ? '#eab308' : '#6b7280';

                    const marker = L.circleMarker([lat, lng], {
                        radius: 5,
                        fillColor: color,
                        color: '#1a1a2e',
                        weight: 1,
                        opacity: 0.9,
                        fillOpacity: 0.8,
                    });

                    const ago = updMs < 60000 ? '<1m ago'
                        : updMs < 3600000 ? Math.round(updMs / 60000) + 'm ago'
                        : updMs < 86400000 ? Math.round(updMs / 3600000) + 'h ago'
                        : Math.round(updMs / 86400000) + 'd ago';

                    const batt = n.battery_level != null && n.battery_level <= 100
                        ? `🔋 ${n.battery_level}%` : '';

                    marker.bindPopup(`
                        <strong>${n.long_name || n.short_name || 'Unknown'}</strong><br>
                        ${n.hardware_model_name || ''}<br>
                        ${n.role_name || ''} · ${ago}<br>
                        ${batt}
                    `);

                    meshLayer.addLayer(marker);
                });
            } catch (err) {
                console.error('Mesh refresh error:', err);
            }
        }

        // Refresh all + update timestamp
        async function refreshMap() {
            await Promise.all([refreshAlerts(), refreshMesh()]);
            document.getElementById('last-updated').textContent =
                'Map: ' + new Date().toLocaleTimeString();
        }

        // Initial load + auto-refresh
        refreshMap();
        setInterval(refreshMap, 30000);
    </script>
</body>
</html>
