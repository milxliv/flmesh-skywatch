<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkyWatch — Situational Awareness</title>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/leaflet.css">
    <script src="/static/leaflet.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-left">
            <h1 class="logo">⚡ SkyWatch</h1>
            <span class="subtitle">FL Mesh Situational Awareness</span>
            <a href="https://areyoumeshingwith.us" class="back-link" target="_blank" rel="noopener">Florida Mesh &rarr;</a>
        </div>
        <div class="top-bar-right">
            <span class="status-indicator" id="connection-status">● LIVE</span>
            <span class="last-updated" id="last-updated"></span>
        </div>
    </header>

    <main class="dashboard">
        <!-- Stats Panel (top strip) -->
        <section class="panel panel-stats"
                 hx-get="/api/stats"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
            <div class="loading">Loading stats...</div>
        </section>

        <!-- Map Panel (left, large) -->
        <section class="panel panel-map">
            <div id="map"></div>
        </section>

        <!-- Event Feed (right column) -->
        <section class="panel panel-feed">
            <div class="panel-header">
                <h2>Event Feed</h2>
                <div class="feed-filters">
                    <select id="filter-source" hx-get="/api/events" hx-include="#filter-severity"
                            hx-target="#event-list" hx-trigger="change" name="source">
                        <option value="">All Sources</option>
                        <option value="nws">NWS</option>
                        <option value="usgs">USGS</option>
                    </select>
                    <select id="filter-severity" hx-get="/api/events" hx-include="#filter-source"
                            hx-target="#event-list" hx-trigger="change" name="severity">
                        <option value="">All Severity</option>
                        <option value="extreme">Extreme</option>
                        <option value="severe">Severe</option>
                        <option value="moderate">Moderate</option>
                        <option value="minor">Minor</option>
                    </select>
                </div>
            </div>
            <div id="event-list"
                 hx-get="/api/events"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
                <div class="loading">Loading events...</div>
            </div>
        </section>

        <!-- Feed Health (bottom strip) -->
        <section class="panel panel-health">
            <div class="panel-header"><h2>Feed Status</h2></div>
            <div id="feed-health"
                 hx-get="/api/health"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
                <div class="loading">Checking feeds...</div>
            </div>
        </section>
    </main>

    <script>
        // Initialize Leaflet map centered on Florida
        const map = L.map('map', {
            center: [27.5, -82.5],
            zoom: 7,
            zoomControl: true,
        });

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Separate layer groups for toggle control
        const alertLayer = L.layerGroup().addTo(map);
        const meshLayer = L.layerGroup().addTo(map);

        // Layer control
        L.control.layers(null, {
            'NWS Alerts': alertLayer,
            'FL Mesh Nodes': meshLayer,
        }, { collapsed: false }).addTo(map);

        // Refresh NWS alert markers
        async function refreshAlerts() {
            try {
                const resp = await fetch('/api/map');
                const events = await resp.json();

                alertLayer.clearLayers();

                events.forEach(e => {
                    const marker = L.circleMarker([e.lat, e.lng], {
                        radius: e.severity === 'extreme' ? 8 : e.severity === 'severe' ? 6 : 4,
                        fillColor: e.color,
                        color: '#1a1a2e',
                        weight: 1,
                        opacity: 0.9,
                        fillOpacity: 0.7,
                    });

                    marker.bindPopup(`
                        <strong>${e.title}</strong><br>
                        <em>${e.source.toUpperCase()}</em> &middot; ${e.severity.toUpperCase()}<br>
                        ${e.area || ''}${e.onset ? '<br>Onset: ' + e.onset : ''}
                    `);

                    alertLayer.addLayer(marker);
                });
            } catch (err) {
                console.error('Alert refresh error:', err);
            }
        }

        // Format uptime from seconds to human-readable
        function formatUptime(secs) {
            if (!secs) return 'unknown';
            const d = Math.floor(secs / 86400);
            const h = Math.floor((secs % 86400) / 3600);
            if (d > 0) return d + 'd ' + h + 'h';
            const m = Math.floor((secs % 3600) / 60);
            return h + 'h ' + m + 'm';
        }

        // Refresh mesh node markers
        async function refreshMesh() {
            try {
                const resp = await fetch('/api/mesh-nodes');
                const nodes = await resp.json();

                meshLayer.clearLayers();

                nodes.forEach(n => {
                    const color = n.online ? '#22c55e' : '#6b7280';
                    const radius = n.online ? 6 : 4;

                    const marker = L.circleMarker([n.lat, n.lng], {
                        radius: radius,
                        fillColor: color,
                        color: '#1a1a2e',
                        weight: 1,
                        opacity: 0.9,
                        fillOpacity: 0.8,
                    });

                    let popup = `<strong>${n.long_name}</strong>`;
                    if (n.short_name) popup += ` <code>${n.short_name}</code>`;
                    popup += `<br><span style="color:${color}">&bull;</span> ${n.online ? 'ONLINE' : 'OFFLINE'}`;
                    if (n.hardware) popup += ` &middot; ${n.hardware}`;
                    if (n.role) popup += `<br>Role: ${n.role}`;
                    if (n.battery !== null && n.battery !== undefined) {
                        popup += `<br>Battery: ${n.battery > 100 ? 'Plugged in' : n.battery + '%'}`;
                    }
                    if (n.uptime) popup += `<br>Uptime: ${formatUptime(n.uptime)}`;
                    if (n.last_heard) {
                        const ago = Math.floor((Date.now() - new Date(n.last_heard).getTime()) / 60000);
                        popup += `<br>Last heard: ${ago < 60 ? ago + 'm ago' : Math.floor(ago/60) + 'h ago'}`;
                    }
                    if (n.node_id_hex) popup += `<br><code>${n.node_id_hex}</code>`;

                    marker.bindPopup(popup);
                    meshLayer.addLayer(marker);
                });
            } catch (err) {
                console.error('Mesh refresh error:', err);
            }
        }

        // Refresh all + update timestamp
        async function refreshMap() {
            await Promise.all([refreshAlerts(), refreshMesh()]);
            document.getElementById('last-updated').textContent =
                'Map: ' + new Date().toLocaleTimeString();
        }

        // Initial load + auto-refresh
        refreshMap();
        setInterval(refreshMap, 30000);
    </script>
</body>
</html>
